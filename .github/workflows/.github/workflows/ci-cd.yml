name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-test-security:
    name: Build, Test, Lint, Security Scan
    runs-on: ubuntu-latest

    env:
      APP_ENV: ci
      APP_SECRET_TOKEN: ${{ secrets.APP_SECRET_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting with flake8
        run: |
          flake8 app tests --max-line-length=100

      - name: Run unit tests
        run: |
          pytest --junitxml=test-report.xml

      - name: Run SAST with Bandit
        run: |
          bandit -r app -f json -o bandit-report.json || true

      - name: Run dependency scan with pip-audit
        run: |
          pip-audit -r requirements.txt

      - name: Generate monitoring output
        run: |
          mkdir -p monitoring-output
          echo "Application health: OK" > monitoring-output/health.txt
          echo "Environment: $APP_ENV" >> monitoring-output/health.txt
          echo "Pipeline run: $GITHUB_RUN_ID" >> monitoring-output/health.txt

      - name: Package application
        run: |
          mkdir -p dist
          tar -czf dist/secure-cicd-app.tar.gz app requirements.txt README.md

      - name: Upload build and reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-cicd-artifacts
          path: |
            dist/secure-cicd-app.tar.gz
            test-report.xml
            bandit-report.json
            monitoring-output/health.txt

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-test-security
    environment: staging

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-cicd-artifacts

      - name: Simulate staging deployment
        run: |
          echo "Deploying application to STAGING environment..."
          echo "Artifact files:"
          ls -la
          echo "Staging deployment completed successfully."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-cicd-artifacts

      - name: Simulate production deployment
        run: |
          echo "Deploying application to PRODUCTION environment..."
          echo "Artifact files:"
          ls -la
          echo "Production deployment completed successfully."